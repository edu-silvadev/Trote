<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title> Trote Solidário </title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <nav class="menu"> <!-- Menu de navegação -->
            <div class="menu-container">
                <a href="index.html" class="menu-logo"> Trote 2026 </a>
                <ul class="lista">
                    <li> <a href="index.html"> Início </a> </li>
                    <li> <a href="introducao.html"> Introdução </a> </li>
                    <li> <a href="formato.html"> Formato </a> </li>
                    <li> <a href="equipes.html"> Equipes </a> </li>
                    <li> <a href="provas.html"> Provas e Metas </a> </li>
                    <li> <a href="integracao.html"> Integração </a> </li>
                    <li> <a href="cronograma.html"> Cronograma </a> </li>
                    <li> <a href="calculadora.html"> Calculadora </a> </li>
                </ul>
            </div>
        </nav>
        <main class="principal">
           <section class="calculadora">
                <h3>Simulador de pontos</h3>
                <div class="form-grid">
                    <div class="form-grupo">
                        <label> Arroz(5Kg) - 10 pts</label> <!--rótulo da caixa de entrada-->
                        <input type="number" id="qtdeArroz" min="0"> <!--caixa de entrada-->
                    </div>
                     <div class="form-grupo">
                        <label> Feijão(2Kg) - 8 pts</label>
                        <input type="number" id="qtdeFeijao" min="0">
                </div>
                <!-- quando este botão for clicado, a função calcular() será chamado no Javascript -->
                <button onclick="calcular()"> Calcular Total da equipe</button>
                <div id="resultado" class="resultado-box">
                    Pontuação total: 0 pontos
                </div>
           </section>
        </main>
        <footer>
            <div class="rodape">
            <p> Coordenação Trote Solidário:trotesolidario@facef.br</p>
            <p> Uni-Facef-centro Universitário Municipal de franca</p>
            </div>
        </footer>
        <script> <!--programar Javascript-->
            function calcular() {
                //nJS é uma linguagem não tipada (sem tipo de dados) 
                // Number() é uma função que convert texto em número
                // reacupera o valor informado no elemento com id qtdeArroz
                let qtdeArroz = Number(document.getElementById("qtdeArroz").value)
                let qtdeFeijao = Number(document.getElementById("qtdeFeijao").value)
                // calcular o valor total de pontos 
                let pontos = (qtdeArroz * 10) + (qtdeFeijao * 8)
                //vamos exibir o resultado para o usuário
                document.getElementById("resultado").innerText = "Pontuação total: " + pontos + " pontos"
            }
        </script>
    </body>
</html>
